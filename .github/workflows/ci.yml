name: CI

on:
  pull_request:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'

      - name: PHP Lint
        run: |
          find src tests -name '*.php' -print0 | xargs -0 -n1 php -l
          php -l ar-design-reporting.php

      - name: Integration Tests
        run: php tests/run-integration-tests.php

