name: Release

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'

      - name: Verify Build
        run: |
          find src tests -name '*.php' -print0 | xargs -0 -n1 php -l
          php scripts/verify-version-consistency.php
          php tests/run-integration-tests.php

      - name: Resolve Version
        id: version
        run: |
          VERSION="$(tr -d '\r\n' < VERSION)"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=v$VERSION" >> "$GITHUB_OUTPUT"

      - name: Check Release Eligibility
        id: eligibility
        run: |
          BEFORE_SHA="${{ github.event.before }}"
          TARGET_TAG="${{ steps.version.outputs.tag }}"

          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "publish=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if [ "$BEFORE_SHA" = "0000000000000000000000000000000000000000" ]; then
            echo "publish=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if git ls-remote --tags origin "$TARGET_TAG" | grep -q "$TARGET_TAG"; then
            echo "publish=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if git diff --name-only "$BEFORE_SHA" "${{ github.sha }}" | grep -q '^VERSION$'; then
            echo "publish=true" >> "$GITHUB_OUTPUT"
          else
            echo "publish=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Build Release Zip
        if: steps.eligibility.outputs.publish == 'true'
        run: |
          rm -rf /tmp/ar-design-reporting-release
          mkdir -p /tmp/ar-design-reporting-release/ar-design-reporting
          rsync -a ./ /tmp/ar-design-reporting-release/ar-design-reporting/ --exclude-from=.distignore
          cd /tmp/ar-design-reporting-release
          zip -r ar-design-reporting.zip ar-design-reporting

      - name: Publish GitHub Release
        if: steps.eligibility.outputs.publish == 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: AR Design Reporting ${{ steps.version.outputs.tag }}
          generate_release_notes: true
          files: /tmp/ar-design-reporting-release/ar-design-reporting.zip
